<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Todo Major Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Todo Major Project</h1>
        <p class="subtitle">A clean, simple, full-featured todo web app</p>
      </header>

      <main class="app-main">
        <section class="card">
          <form id="todo-form" class="todo-form">
            <input
              id="todo-input"
              class="todo-input"
              type="text"
              placeholder="What do you need to get done?"
              autocomplete="off"
            />
            <button type="submit" class="btn primary">Add task</button>
          </form>
          <p id="error-message" class="error-message" hidden></p>
        </section>

        <section class="card list-card">
          <header class="list-header">
            <h2>Tasks</h2>
            <div class="filters">
              <button class="chip chip-active" data-filter="all">All</button>
              <button class="chip" data-filter="active">Active</button>
              <button class="chip" data-filter="completed">Completed</button>
            </div>
          </header>

          <ul id="todo-list" class="todo-list"></ul>

          <footer class="list-footer">
            <span id="todo-count">0 tasks</span>
            <button id="clear-completed" class="btn text">Clear completed</button>
          </footer>
        </section>
      </main>

      <footer class="app-footer">
        <span>Built with Express + vanilla JS</span>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
